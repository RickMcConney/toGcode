<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 20" width="48" height="20">
  <!-- Shank -->
  <rect x="0" y="5" width="24" height="10" rx="1" fill="#888" stroke="#555" stroke-width="0.75"/>
  <!-- Cutting flutes -->
  <rect x="24" y="5" width="20" height="10" rx="0.5" fill="#4a9eda" stroke="#2a6ea0" stroke-width="0.75"/>
  <!-- Flute lines -->
  <line x1="30" y1="5" x2="28" y2="15" stroke="#2a6ea0" stroke-width="0.5"/>
  <line x1="36" y1="5" x2="34" y2="15" stroke="#2a6ea0" stroke-width="0.5"/>
  <line x1="42" y1="5" x2="40" y2="15" stroke="#2a6ea0" stroke-width="0.5"/>
  <!-- Flat end -->
  <line x1="44" y1="5" x2="44" y2="15" stroke="#2a6ea0" stroke-width="1"/>
</svg>